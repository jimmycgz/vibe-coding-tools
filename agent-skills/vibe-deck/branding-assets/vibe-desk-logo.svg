<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="VibeDesk logo">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1A73E8"/>
      <stop offset="0.5" stop-color="#20B2AA"/>
      <stop offset="1" stop-color="#34A853"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#E65100"/>
      <stop offset="1" stop-color="#F6C445"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background capsule -->
  <rect x="20" y="40" width="1160" height="280" rx="60" fill="#F5F7FA"/>

  <!-- Abstract mark -->
  <g transform="translate(70,80)">
    <rect x="0" y="30" width="160" height="160" rx="28" fill="url(#g1)" filter="url(#shadow)"/>
    <circle cx="200" cy="110" r="60" fill="url(#g2)" filter="url(#shadow)"/>
    <path d="M300 30 L380 110 L300 190 Z" fill="#6A1B9A" filter="url(#shadow)"/>
    <rect x="120" y="200" width="220" height="36" rx="18" fill="#1976D2"/>
    <circle cx="320" cy="230" r="18" fill="#20B2AA"/>
  </g>

  <!-- Logotype -->
  <g transform="translate(440,110)">
    <text x="0" y="80" font-family="Helvetica, Arial, sans-serif" font-size="96" font-weight="700">
      <tspan fill="#0D47A1">Vibe</tspan><tspan fill="#1A1C29">Desk</tspan>
    </text>
    <text x="2" y="140" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#666666">Slide deck as code. Fast, clean, repeatable.</text>
  </g>
</svg>
